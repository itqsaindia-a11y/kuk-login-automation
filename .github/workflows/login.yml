name: Auto Login

on:
  schedule:
    - cron: "30 3 * * 1-6"
    - cron: "30 15 * * 1-6"

jobs:
  run-login:
    runs-on: ubuntu-latest

    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Selenium
        run: pip install selenium

      - name: Run Script
        run: python login.py
